  name: Get export prices
  description: >
    Returns feed-in prices (what you receive when exporting to the grid) for a
    time range. Without start/end returns today and tomorrow. Uses export pricing
    mode and commission configured in generation settings.
  fields:
    config_entry_id:
      name: Config entry ID
      description: Required when multiple Kilowahti entries are configured.
      required: false
      example: "abc123def456"
      selector:
        text:
    start:
      name: Start
      description: Start of the range (inclusive). Omit to use today/tomorrow.
      required: false
      example: "2024-01-15 00:00:00"
      selector:
        datetime:
    end:
      name: End
      description: End of the range (exclusive). Omit to use today/tomorrow.
      required: false
      example: "2024-01-15 23:59:59"
      selector:
        datetime:
    formatted:
      name: Formatted
      description: >
        When true (default), prices are converted to the configured display unit
        and rounded. When false, raw c/kWh values are returned.
      required: false
      default: true
      selector:
        boolean:

