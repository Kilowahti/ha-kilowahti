get_active_prices:
  name: Get active prices
  description: >
    Returns price slots with effective price (fixed-period override applied
    where active), transfer price included in total_price, and an is_fixed
    flag per slot. Without start/end returns today and tomorrow. With
    start/end returns that range. Prices are in the unit configured for this
    entry (c/kWh or €/kWh), VAT included.
  fields:
    config_entry_id:
      name: Config entry ID
      description: >
        Required when multiple Kilowahti entries are configured.
        Omit when only one entry exists.
      required: false
      example: "abc123def456"
      selector:
        text:
    start:
      name: Start
      description: Start of the range (inclusive). Omit to use today/tomorrow.
      required: false
      example: "2024-01-15 00:00:00"
      selector:
        datetime:
    end:
      name: End
      description: End of the range (exclusive). Omit to use today/tomorrow.
      required: false
      example: "2024-01-15 23:59:59"
      selector:
        datetime:
    formatted:
      name: Formatted
      description: >
        When true (default), prices are converted to the configured display unit
        and rounded for display. When false, raw values in c/kWh are returned
        at full precision.
      required: false
      default: true
      selector:
        boolean:

get_prices:
  name: Get prices
  description: >
    Returns spot price slots for a given time range. Prices are in the
    unit configured for this entry (c/kWh or €/kWh), VAT included.
  fields:
    config_entry_id:
      name: Config entry ID
      description: >
        Required when multiple Kilowahti entries are configured.
        Omit when only one entry exists.
      required: false
      example: "abc123def456"
      selector:
        text:
    start:
      name: Start
      description: Start of the range (inclusive).
      required: true
      example: "2024-01-15 00:00:00"
      selector:
        datetime:
    end:
      name: End
      description: End of the range (exclusive).
      required: true
      example: "2024-01-15 23:59:59"
      selector:
        datetime:
    formatted:
      name: Formatted
      description: >
        When true (default), prices are converted to the configured display unit
        and rounded for display. When false, raw values in c/kWh are returned
        at full precision.
      required: false
      default: true
      selector:
        boolean:

cheapest_hours:
  name: Cheapest hours
  description: >
    Finds the cheapest consecutive window of the given length within a
    time range, using a sliding-window search over spot prices.
  fields:
    config_entry_id:
      name: Config entry ID
      description: >
        Required when multiple Kilowahti entries are configured.
      required: false
      example: "abc123def456"
      selector:
        text:
    start:
      name: Start
      description: Start of the search range.
      required: true
      example: "2024-01-15 00:00:00"
      selector:
        datetime:
    end:
      name: End
      description: End of the search range.
      required: true
      example: "2024-01-15 23:59:59"
      selector:
        datetime:
    hours:
      name: Hours
      description: Length of the window in hours (minimum 0.25, maximum 24).
      required: true
      example: 3
      selector:
        number:
          min: 0.25
          max: 24
          step: 0.25
          unit_of_measurement: h
    formatted:
      name: Formatted
      description: >
        When true (default), prices are converted to the configured display unit
        and rounded for display. When false, raw values in c/kWh are returned
        at full precision.
      required: false
      default: true
      selector:
        boolean:

