generation_schedule:
  name: Generation schedule
  description: >
    Given a per-slot generation forecast, returns a recommended action for each
    slot: self_consume (own generation is more valuable as avoided import cost),
    export (export price exceeds total import price, very rare), or idle (no
    generation). Self-consumption value equals the total import price (spot +
    transfer) for that slot.
  fields:
    config_entry_id:
      name: Config entry ID
      description: Required when multiple Kilowahti entries are configured.
      required: false
      example: "abc123def456"
      selector:
        text:
    forecast:
      name: Forecast
      description: >
        List of forecast slots. Each entry must have a "time" (ISO datetime) and
        "kwh" (expected generation in that slot, >= 0).
      required: true
      example: '[{"time": "2024-01-15 10:00:00", "kwh": 1.5}]'
      selector:
        object:
    formatted:
      name: Formatted
      description: >
        When true (default), prices are converted to the configured display unit
        and rounded. When false, raw c/kWh values are returned.
      required: false
      default: true
      selector:
        boolean:
