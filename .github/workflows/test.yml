name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            pytest>=8.0 \
            pytest-asyncio>=0.23 \
            pytest-homeassistant-custom-component>=0.13 \
            aioresponses>=0.7 \
            "kilowahti@git+https://github.com/Kilowahti/kilowahti-py.git@484e619"

      - name: Run tests
        run: pytest tests/
